<div class="card border-0 h-100">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2 class="h5 mb-0">{{ isEditMode ? 'Editar tarea' : 'Nueva tarea' }}</h2>
      <button
        *ngIf="isEditMode"
        type="button"
        class="btn btn-sm btn-outline-secondary"
        (click)="cancelEdit.emit()"
      >
        Cancelar
      </button>
    </div>

    <form [formGroup]="taskForm" (ngSubmit)="submit()" novalidate>
      <div class="mb-3">
        <label class="form-label" for="title">Titulo</label>
        <input id="title" type="text" class="form-control" formControlName="title" />
        <div
          class="text-danger small mt-1"
          *ngIf="taskForm.controls.title.touched && taskForm.controls.title.invalid"
        >
          El titulo es obligatorio y debe tener al menos 3 caracteres.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="description">Descripcion</label>
        <textarea
          id="description"
          rows="4"
          class="form-control"
          formControlName="description"
        ></textarea>
        <div
          class="text-danger small mt-1"
          *ngIf="taskForm.controls.description.touched && taskForm.controls.description.invalid"
        >
          La descripcion es obligatoria y debe tener al menos 5 caracteres.
        </div>
      </div>

      <div class="form-check mb-4">
        <input
          id="completed"
          type="checkbox"
          class="form-check-input"
          formControlName="completed"
        />
        <label class="form-check-label" for="completed">Marcar como completada</label>
      </div>

      <button class="btn btn-primary w-100" type="submit">
        {{ isEditMode ? 'Guardar cambios' : 'Crear tarea' }}
      </button>
    </form>
  </div>
</div>
